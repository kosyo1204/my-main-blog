name: Lighthouse CI

on:
  push:
    branches: [001-tech-blog]
  pull_request:
    branches: [001-tech-blog]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build site
        run: npm run build
      
      - name: Run Lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx @lhci/cli@0.9.x autorun --config=.lighthouserc.json --upload-to-github
        continue-on-error: false
