name: Build and Deploy Blog

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run test:typography (before build - validates source files only)
      - name: Test typography configuration
        run: npm run test:typography

      # Run test:slugify (before build - prevents taxonomy permalink conflicts)
      - name: Test slugify behavior
        run: npm run test:slugify

      # Build the site
      - name: Build site
        run: npm run build

      # Run test:published
      - name: Test published filter
        run: npm run test:published

      # Run test:404
      - name: Test 404 page
        run: npm run test:404

      # Run test:taxonomy
      - name: Test taxonomy pages
        run: npm run test:taxonomy

      # Run test:link-validation
      - name: Test internal links (pathPrefix)
        run: npm run test:link-validation

      # Run test:animations
      - name: Test animations and micro-interactions
        run: npm run test:animations

      # Run test:visual-effects
      - name: Test visual effects (shadows, backgrounds)
        run: npm run test:visual-effects

      # Run test:article-html
      - name: Test article HTML structure and CSS
        run: npm run test:article-html

      # Upload build artifact for deploy job and PRs
      # Skip for develop branch pushes (deploy job won't run anyway)
      - name: Upload build artifact
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          # PR: 7 days (for review), master push: 1 day (deployed immediately)
          retention-days: ${{ github.event_name == 'pull_request' && 7 || 1 }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      # Download build artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site/

      # Deploy to GitHub Pages
      # Security: Pinned to commit SHA instead of version tag to prevent supply chain attacks
      # peaceiris/actions-gh-pages@v3.9.3 (2023-03-30)
      # Ref: https://github.com/peaceiris/actions-gh-pages/releases/tag/v3.9.3
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f2b595c1ea9b49d2257d53eaea2c7b4ce4e # v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
