name: Lighthouse CI

on:
  push:
    branches: [001-tech-blog]
  pull_request:
    branches: [001-tech-blog]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build site
        run: npm run build
      
      - name: Run Lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx @lhci/cli@0.9.x autorun --config=.lighthouserc.json
        continue-on-error: true
      
      - name: Debug Lighthouse output
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "GitHub event path: ${{ github.event_path }}"
          ls -la .lighthouseci/ || echo "No .lighthouseci dir"
          find . -name "*lhci*" -o -name "*lighthouse*" 2>/dev/null | head -20
      
      - name: Comment PR with Lighthouse scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const reportPath = '.lighthouseci/lhci-results.json';
            let scores = { perf: 'N/A', a11y: 'N/A', bp: 'N/A', seo: 'N/A' };
            
            if (fs.existsSync(reportPath)) {
              try {
                const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                if (data.runs && data.runs.length > 0) {
                  const firstRun = data.runs[0].lhr;
                  scores.perf = Math.round(firstRun.categories.performance.score * 100);
                  scores.a11y = Math.round(firstRun.categories.accessibility.score * 100);
                  scores.bp = Math.round(firstRun.categories['best-practices'].score * 100);
                  scores.seo = Math.round(firstRun.categories.seo.score * 100);
                }
              } catch (e) {
                console.error('Failed to parse results:', e);
              }
            }
            
            const message = [
              '## Lighthouse Score',
              '',
              '| Category | Score |',
              '|----------|-------|',
              `| Performance | ${scores.perf} |`,
              `| Accessibility | ${scores.a11y} |`,
              `| Best Practices | ${scores.bp} |`,
              `| SEO | ${scores.seo} |`,
              ''
            ].join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
