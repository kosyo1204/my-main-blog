name: Lighthouse CI

on:
  push:
    branches: [001-tech-blog]
  pull_request:
    branches: [001-tech-blog]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build site
        run: npm run build
      
      - name: Run Lighthouse
        id: lighthouse
        run: npx @lhci/cli@0.9.x autorun --config=.lighthouserc.json
        continue-on-error: true
      
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
      
      - name: Comment PR with Lighthouse scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Lighthouse レポートから スコアを読み取る（簡易版）
            // 実際には lhci-server-build-record.json を解析
            let comment = '## 🔆 Lighthouse Score\n\n';
            comment += '| カテゴリ | スコア |\n';
            comment += '|---------|--------|\n';
            comment += '| Performance | TBD |\n';
            comment += '| Accessibility | TBD |\n';
            comment += '| Best Practices | TBD |\n';
            comment += '| SEO | TBD |\n\n';
            comment += '📄 [詳細レポート](https://lighthouse.example.com)\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
