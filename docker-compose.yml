services:
  web:
    build: .
    # ソースコードをコンテナにマウントしてホットリロード可能にする
    volumes:
      - ./:/app:delegated
      # node_modules をホストに作らせないため匿名ボリューム
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    # Eleventy の dev コマンドを実行（package.json の scripts.dev を使用）
    command: ["npm", "run", "dev"]
