name: Build and Deploy Blog

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test, and Deploy

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run test:typography (before build - validates source files only)
      - name: Test typography configuration
        run: npm run test:typography

      # Run test:slugify (before build - prevents taxonomy permalink conflicts)
      - name: Test slugify behavior
        run: npm run test:slugify

      # Build the site
      - name: Build site
        run: npm run build

      # Run test:published
      - name: Test published filter
        run: npm run test:published

      # Run test:404
      - name: Test 404 page
        run: npm run test:404

      # Run test:taxonomy
      - name: Test taxonomy pages
        run: npm run test:taxonomy

      # Run test:link-validation
      - name: Test internal links (pathPrefix)
        run: npm run test:link-validation

      # Run test:animations
      - name: Test animations and micro-interactions
        run: npm run test:animations

      # Run test:visual-effects
      - name: Test visual effects (shadows, backgrounds)
        run: npm run test:visual-effects

      # Run test:article-html
      - name: Test article HTML structure and CSS
        run: npm run test:article-html

      # Deploy to GitHub Pages (on master push only)
      # Security: Pinned to commit SHA instead of version tag to prevent supply chain attacks
      # peaceiris/actions-gh-pages@v3.9.3 (2023-03-30)
      # Ref: https://github.com/peaceiris/actions-gh-pages/releases/tag/v3.9.3
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@884a022ae1324d3c237eda2f031bf38156050999
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

      # Archive build output for pull requests
      - name: Archive build output
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: site-pr-${{ github.event.pull_request.number }}
          path: _site/
          retention-days: 5
