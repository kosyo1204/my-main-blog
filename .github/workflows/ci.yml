name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        pwsh -File .specify/scripts/powershell/setup-plan.ps1 -Json        run: npm ci --include=optional --no-audit --no-fund

      - name: Build
        run: npm run build